<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Fake Account Detector</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #fdf2f8, #eef2ff);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen px-4">

    <div class="bg-white shadow-xl rounded-2xl p-8 max-w-md w-full fade-in border border-gray-100">

        <!-- Logo -->
        <div class="flex justify-center mb-4">
            <div class="bg-pink-100 p-3 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="h-8 w-8 text-pink-600"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor">
                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M9.75 17L15 12l-5.25-5" />
                </svg>
            </div>
        </div>

        <!-- Heading -->
        <h1 class="text-2xl font-bold text-center text-gray-800">
            Instagram Fake Account Detector
        </h1>

        <p class="text-center text-gray-500 text-sm mt-2 mb-6">
            Check whether an Instagram account looks real or fake.
        </p>

        <!-- Form -->
        <form action="/predict" method="post" class="space-y-5">

            <div>
                <label for="username"
                       class="block text-sm font-medium text-gray-700 mb-2">
                    Instagram Username
                </label>

                <div class="relative">
                    <span class="absolute left-3 top-3 text-gray-400">@</span>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        placeholder="example_user"
                        class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-500 transition"
                    />
                </div>
            </div>

            <!-- Button -->
            <button
                type="submit"
                class="w-full bg-gradient-to-r from-pink-500 to-purple-500 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition duration-200"
            >
                Analyze Account
            </button>

        </form>

    </div>

</body>
</html>
